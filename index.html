<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SII - Servicio de Impuestos Internos</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #FEF9E7;
            --text-color: #000000;
            --blue-color: #0056b3;
            --font-family: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: var(--font-family);
            min-height: 100vh;
        }

        /* OCULTAR EL CONTENIDO PRINCIPAL POR DEFECTO */
        #main-content {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        /* PANTALLA DE ACCESO (MODAL) */
        #lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
        }

        .login-box h2 {
            margin-bottom: 20px;
            font-size: 1.6rem;
            color: #2c3e50;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        .login-box input:focus {
            border-color: #3498db;
        }

        .login-box button {
            padding: 12px 30px;
            border: none;
            background: #3498db;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .login-box button:hover {
            background: #2980b9;
        }

        .error-txt {
            color: #e74c3c;
            margin-top: 15px;
            font-size: 0.95rem;
            font-weight: bold;
            display: none;
        }

        /* ESTILOS ORIGINALES DEL CONTENIDO */
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--text-color);
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .btn-container {
            margin-top: 1rem;
        }

        .sii-button {
            display: inline-block;
            padding: 1rem 3rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--blue-color);
            text-decoration: none;
            background-color: white;
            border: 2px solid var(--blue-color);
            border-radius: 50px;
        }

        /* ESTILO DE TU FIRMA DESTACADA */
        .firma {
            margin-top: 60px;
            text-align: center;
            font-size: 2.6rem;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: bold;
            color: #2c3e50;
            letter-spacing: 1px;
        }

        .fecha { font-size: 2rem; margin-bottom: 5px; font-weight: bold; }
        .nombre { font-size: 3rem; font-weight: bold; }

        @media(max-width:768px) {
            h1 { font-size: 2.2rem; }
            .sii-button { font-size: 1.2rem; padding: 0.8rem 2rem; }
            .firma { font-size: 2rem; }
            .nombre { font-size: 2.3rem; }
            .fecha { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <!-- 1. Pantalla de bloqueo integrada para solicitar contraseña -->
    <div id="lock-screen">
        <div class="login-box">
            <h2>Acceso Protegido</h2>
            <input type="password" id="pass-input" placeholder="Introduce la contraseña" onkeypress="checkEnter(event)">
            <br>
            <button onclick="validatePassword()">Ingresar</button>
            <div id="error-msg" class="error-txt">Contraseña incorrecta</div>
        </div>
    </div>

    <!-- Contenido original protegido -->
    <div id="main-content">
        <h1>SERVICIO DE IMPUESTOS INTERNOS</h1>

        <div class="btn-container">
            <a href="https://homer.sii.cl/" class="sii-button">SII</a>
        </div>

        <!-- 2. Tu firma destacada en negrita -->
        <div class="firma">
            <div class="fecha">20-08-25</div>
            <div class="nombre">Iván C.</div>
        </div>
    </div>

    <script>
        function validatePassword() {
            const input = document.getElementById("pass-input").value;
            const errorMsg = document.getElementById("error-msg");
            const lockScreen = document.getElementById("lock-screen");
            const mainContent = document.getElementById("main-content");

                if (input === "ico.6996") {  
                lockScreen.style.display = "none"; 
                mainContent.style.display = "flex"; /* Se activa como flex para mantener la alineación original */
            } else {
                errorMsg.style.display = "block"; 
            }
        }

        function checkEnter(event) {
            if (event.key === "Enter") {
                validatePassword();
            }
        }
    </script>

</body>
</html>
