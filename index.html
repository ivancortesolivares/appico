<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SII - Servicio de Impuestos Internos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FEF9E7; /* Amarillo pálido */
            --text-color: #000000;
            --blue-color: #0056b3;
            --font-family: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--text-color);
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .btn-container {
            margin-top: 1rem;
        }

        .sii-button {
            display: inline-block;
            padding: 1rem 3rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--blue-color);
            text-decoration: none;
            background-color: white;
            border: 2px solid var(--blue-color);
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .sii-button:hover {
            background-color: var(--blue-color);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 86, 179, 0.2);
        }

        .sii-button:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <h1>SERVICIO DE IMPUESTOS INTERNOS</h1>

    <div class="btn-container">
        <a href="https://homer.sii.cl/" class="sii-button" id="sii-redirect-btn">SII</a>
    </div>

</body>
</html>
